<!DOCTYPE html>
<html>
<head>
  <title>Clarity Test SPA</title>

  <!-- Clarity tracking script -->
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wn1z2a3bgr");
</script>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }
    .page {
      display: none;
    }
    .active {
      display: block;
    }
    .box {
      height: 1500px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>Clarity SPA Test</h1>

  <!-- Navigation -->
  <button onclick="showPage('page1')">Go to Page 1</button>
  <button onclick="showPage('page2')">Go to Page 2</button>

  <!-- Page 1 -->
  <div id="page1" class="page active">
    <h2>Page 1</h2>
    <p>This is Page 1</p>
    <div class="box" style="background: lightblue;">
      Scroll here
    </div>
  </div>

  <!-- Page 2 -->
  <div id="page2" class="page">
    <h2>Page 2</h2>
    <p>This is Page 2</p>
    <div class="box" style="background: lightgreen;">
      Scroll here
    </div>
  </div>

  <script>
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');

      // Simulate URL change (important for Clarity)
      history.pushState({}, '', '#' + pageId);
    }
  </script>

</body>
</html>
