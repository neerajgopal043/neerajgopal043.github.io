<!DOCTYPE html>
<html>
<head>
  <title>Clarity SPA Test</title>

  <!-- Clarity script here -->
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wn1z2a3bgr");
</script>
  <style>
    .page { display: none; }
    .active { display: block; }
    .box { height: 1500px; margin-top: 20px; }
  </style>
</head>

<body>

<h1>Clarity Test</h1>

<button onclick="showPage('page1')">Page 1</button>
<button onclick="showPage('page2')">Page 2</button>

<div id="page1" class="page active">
  <h2>Page 1</h2>
  <div class="box" style="background: lightblue;"></div>
</div>

<div id="page2" class="page">
  <h2>Page 2</h2>
  <div class="box" style="background: lightgreen;"></div>
</div>

<script>
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');

  // IMPORTANT: force Clarity to track page change
  if (window.clarity) {
    window.clarity("set", "page", pageId);
  }
}
</script>

</body>
</html>
